name: Build APK ze ZIPu

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rozbalit projekt
        run: |
          unzip -o *.zip
          rm -rf AI-FotoAsistent-S22-Ultra/gradle/wrapper
          rm -f AI-FotoAsistent-S22-Ultra/gradlew AI-FotoAsistent-S22-Ultra/gradlew.bat
          ls -la AI-FotoAsistent-S22-Ultra

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
          validate-wrappers: false

      - name: Build a testy
        working-directory: AI-FotoAsistent-S22-Ultra
        run: gradle testDebugUnitTest assembleDebug

      - name: Nahrat APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-FotoAsistent-debug-apk
          path: AI-FotoAsistent-S22-Ultra/app/build/outputs/apk/debug/app-debug.apk
